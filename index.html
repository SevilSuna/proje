<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Suna Case Opening v1.0</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .case-wrapper { width: 80%; margin: 50px auto; overflow: hidden; position: relative; border: 2px solid #444; height: 150px; background: #222; }
        .item-strip { display: flex; width: 5000px; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .item { width: 120px; height: 120px; margin: 15px; background: #333; border: 2px solid #555; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .rare { background: linear-gradient(to bottom, #eb4b4b, #8a1c1c); border-color: gold; } /* Kırmızı Item */
        .marker { position: absolute; left: 50%; top: 0; width: 4px; height: 150px; background: gold; z-index: 10; }
        .controls { margin-top: 30px; }
        button { padding: 15px 30px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #5c5cff; color: white; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>

    <h1>🚀 Suna Soroban Case Opening</h1>
    
    <div class="case-wrapper">
        <div class="marker"></div>
        <div class="item-strip" id="strip">
            </div>
    </div>

    <div class="controls">
        <button id="btn-commit">1. Mühürle (Commit)</button>
        <button id="btn-reveal" disabled>2. Kasayı Aç (Reveal)</button>
    </div>

    <div id="status">Cüzdan bekleniyor...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/11.3.0/stellar-sdk.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
